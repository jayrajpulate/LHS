<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Lawyers | LHS — Lawyer Hiring System</title>
  <meta name="description" content="Search and filter verified lawyers across India by name, city, state, and practice area.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>
<div id="page-loader"><div class="loader-ring"></div><div class="loader-text">LHS</div></div>
<div id="toast-container"></div>

<!-- Navbar -->
<nav class="lhs-navbar navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">L<span>H</span>S</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav mx-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="lawyers.html">Find Lawyers</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
      <a href="admin/login.html" class="nav-link btn-nav">Admin Panel</a>
    </div>
  </div>
</nav>

<!-- Page Header -->
<div style="background:linear-gradient(135deg,#0d1b2a 0%,#1a3a5c 100%);padding:110px 0 50px;margin-bottom:0;">
  <div class="container text-white">
    <h1 style="font-family:'Playfair Display',serif;font-weight:900;font-size:2.5rem;">Find a Lawyer</h1>
    <p style="color:rgba(255,255,255,0.7);margin:0;">Browse <span id="result-count" style="color:#c9a84c;font-weight:700;">0</span> verified legal professionals across India</p>
  </div>
</div>

<div class="container py-5">
  <div class="row">
    <!-- Filter Sidebar -->
    <div class="col-lg-3 mb-4">
      <div class="filter-sidebar reveal-left">
        <h6 class="mb-4" style="color:#1a3a5c;font-size:1rem;font-weight:700;">🔍 Filter & Search</h6>

        <h6>Name</h6>
        <input type="text" id="filter-name" class="form-control" placeholder="Search by name...">

        <h6>City</h6>
        <input type="text" id="filter-city" class="form-control" placeholder="e.g. Mumbai, Delhi...">

        <h6>State</h6>
        <select id="filter-state" class="form-select">
          <option value="">All States</option>
          <option>Andhra Pradesh</option><option>Delhi</option><option>Gujarat</option>
          <option>Karnataka</option><option>Kerala</option><option>Maharashtra</option>
          <option>Punjab</option><option>Rajasthan</option><option>Tamil Nadu</option>
          <option>Telangana</option><option>Uttar Pradesh</option><option>West Bengal</option>
        </select>

        <h6>Practice Area</h6>
        <select id="filter-area" class="form-select">
          <option value="">All Areas</option>
        </select>

        <button id="filter-reset" class="btn btn-outline-secondary w-100 mt-2" style="border-radius:8px;font-size:0.88rem;">
          <i class="bi bi-x-circle me-2"></i>Reset Filters
        </button>
      </div>
    </div>

    <!-- Lawyers Grid -->
    <div class="col-lg-9">
      <div class="row" id="lawyers-grid">
        <div class="col-12 text-center py-5">
          <div class="loader-ring mx-auto" style="border-top-color:#1a3a5c;"></div>
          <p class="mt-3 text-muted">Loading lawyers...</p>
        </div>
      </div>
      <div id="pagination" class="mt-4"></div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="lhs-footer">
  <div class="container">
    <div class="footer-bottom d-flex justify-content-between align-items-center flex-wrap gap-2">
      <p class="mb-0">© 2024 LHS — Lawyer Hiring System. All rights reserved.</p>
      <div class="d-flex gap-3"><a href="index.html">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a></div>
    </div>
  </div>
</footer>

<button id="back-to-top" aria-label="Back to top"><i class="bi bi-chevron-up"></i></button>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/lawyers.js"></script>
</body>
</html>
