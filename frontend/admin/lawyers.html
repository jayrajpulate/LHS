<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Lawyers | LHS Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/admin.css" rel="stylesheet">
</head>
<body>
<div id="admin-toast-container"></div>
<div class="admin-overlay" id="admin-overlay"></div>

<div class="admin-wrapper">
  <!-- Sidebar -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <a href="dashboard.html" class="sidebar-brand">
      <div class="logo-icon">LHS</div>
      <span class="logo-text">L<span>H</span>S Admin</span>
    </a>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Main</div>
      <div class="nav-item"><a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a></div>
      <div class="sidebar-section">Management</div>
      <div class="nav-item"><a href="lawyers.html" class="nav-link active"><i class="bi bi-people-fill"></i> Lawyers</a></div>
      <div class="nav-item"><a href="practice-areas.html" class="nav-link"><i class="bi bi-journals"></i> Practice Areas</a></div>
      <div class="nav-item"><a href="pages.html" class="nav-link"><i class="bi bi-file-text"></i> Site Pages</a></div>
      <div class="sidebar-section">System</div>
      <div class="nav-item"><a href="../index.html" class="nav-link" target="_blank"><i class="bi bi-box-arrow-up-right"></i> View Site</a></div>
      <div class="nav-item"><a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a></div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="sidebar-user-initials">A</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-user-name">Admin</div>
          <div class="user-role" id="sidebar-user-role">Admin</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="toggle-sidebar-btn" id="toggle-sidebar"><i class="bi bi-list"></i></button>
        <span class="topbar-title">Manage Lawyers</span>
        <span class="badge" style="background:rgba(201,168,76,0.15);color:#c9a84c;font-size:0.75rem;font-weight:700;border-radius:20px;padding:4px 12px;" id="lawyer-count">0</span>
      </div>
      <div class="topbar-actions">
        <button class="btn-admin-gold" onclick="openAddModal()" style="border-radius:8px;font-size:0.85rem;display:flex;align-items:center;gap:6px;">
          <i class="bi bi-plus-lg"></i> Add Lawyer
        </button>
      </div>
    </header>

    <main class="admin-content">
      <div class="data-table-wrapper animate-in">
        <div class="data-table-header">
          <h5>All Lawyers</h5>
          <div class="d-flex gap-2 flex-wrap">
            <div class="data-table-search">
              <i class="bi bi-search"></i>
              <input type="text" id="lawyer-search" placeholder="Search by name...">
            </div>
            <select id="filter-public" class="form-select" style="width:auto;font-size:0.85rem;border-radius:6px;border:1px solid #e2e8f0;padding:8px 12px;">
              <option value="">All Status</option>
              <option value="1">Public</option>
              <option value="0">Private</option>
            </select>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Lawyer</th>
                <th>City</th>
                <th>Practice Areas</th>
                <th>Experience</th>
                <th>Status</th>
                <th>Added</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="lawyers-tbody">
              <tr><td colspan="7" class="text-center py-4"><div class="loader-ring mx-auto"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="p-3" id="lawyers-pagination"></div>
      </div>
    </main>
  </div>
</div>

<!-- ── Add/Edit Lawyer Modal ── -->
<div class="modal fade" id="lawyer-modal" tabindex="-1" aria-label="Lawyer Modal">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title">Add New Lawyer</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="lawyer-form" class="admin-form" enctype="multipart/form-data">

          <!-- Profile Pic Upload -->
          <div class="mb-4 text-center">
            <div id="preview-wrap"></div>
            <div id="upload-area" class="upload-area">
              <div class="upload-icon"><i class="bi bi-camera-fill"></i></div>
              <p class="fw-600 mb-1">Click or drag image here</p>
              <p style="font-size:0.78rem;">JPG, PNG, WebP — Max 5MB</p>
              <input type="file" id="field-profile-pic" name="profile_pic" accept="image/*" style="display:none;">
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Full Name *</label>
              <input type="text" id="field-name" name="LawyerName" class="form-control" required placeholder="Adv. Rajesh Kumar">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Email</label>
              <input type="email" id="field-email" name="LawyerEmail" class="form-control" placeholder="lawyer@example.com">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Mobile No</label>
              <input type="tel" id="field-mobile" name="LawyerMobileNo" class="form-control" placeholder="9876543210">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Experience (years)</label>
              <input type="number" id="field-exp" name="LawyerExp" class="form-control" min="0" max="60" placeholder="10">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Visibility</label>
              <select id="field-public" name="IsPublic" class="form-select">
                <option value="0">Private</option>
                <option value="1">Public</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">City</label>
              <input type="text" id="field-city" name="City" class="form-control" placeholder="Mumbai">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">State</label>
              <input type="text" id="field-state" name="State" class="form-control" placeholder="Maharashtra">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Practice Areas <small class="text-muted">(comma-separated)</small></label>
              <input type="text" id="field-areas" name="PracticeAreas" class="form-control" placeholder="Criminal Law, Family Law, Property Law">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Courts</label>
              <input type="text" id="field-courts" name="Courts" class="form-control" placeholder="Bombay High Court, District Court">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Languages Known</label>
              <input type="text" id="field-langs" name="LanguagesKnown" class="form-control" placeholder="English, Hindi, Marathi">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Website</label>
              <input type="url" id="field-website" name="Website" class="form-control" placeholder="https://lawyer.example.com">
            </div>
            <div class="col-12 mb-3">
              <label class="form-label">Office Address</label>
              <input type="text" id="field-address" name="OfficeAddress" class="form-control" placeholder="123 Legal Street, Andheri West...">
            </div>
            <div class="col-12 mb-3">
              <label class="form-label">Bio / Description</label>
              <textarea id="field-desc" name="Description" class="form-control" rows="4" placeholder="Tell clients about the lawyer's specialization and achievements..."></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" form="lawyer-form" class="btn-admin-gold px-4" id="modal-submit-btn" style="border-radius:8px;">
          Save Lawyer
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/admin/auth.js"></script>
<script src="../assets/js/admin/lawyers.js"></script>
</body>
</html>
