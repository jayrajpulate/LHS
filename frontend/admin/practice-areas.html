<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Areas | LHS Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/admin.css" rel="stylesheet">
</head>
<body>
<div id="admin-toast-container"></div>
<div class="admin-overlay" id="admin-overlay"></div>

<div class="admin-wrapper">
  <aside class="admin-sidebar" id="admin-sidebar">
    <a href="dashboard.html" class="sidebar-brand">
      <div class="logo-icon">LHS</div>
      <span class="logo-text">L<span>H</span>S Admin</span>
    </a>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Main</div>
      <div class="nav-item"><a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a></div>
      <div class="sidebar-section">Management</div>
      <div class="nav-item"><a href="lawyers.html" class="nav-link"><i class="bi bi-people-fill"></i> Lawyers</a></div>
      <div class="nav-item"><a href="practice-areas.html" class="nav-link active"><i class="bi bi-journals"></i> Practice Areas</a></div>
      <div class="nav-item"><a href="pages.html" class="nav-link"><i class="bi bi-file-text"></i> Site Pages</a></div>
      <div class="sidebar-section">System</div>
      <div class="nav-item"><a href="../index.html" class="nav-link" target="_blank"><i class="bi bi-box-arrow-up-right"></i> View Site</a></div>
      <div class="nav-item"><a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a></div>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="sidebar-user-initials">A</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-user-name">Admin</div>
          <div class="user-role" id="sidebar-user-role">Admin</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="toggle-sidebar-btn" id="toggle-sidebar"><i class="bi bi-list"></i></button>
        <span class="topbar-title">Practice Areas</span>
        <span class="badge" style="background:rgba(201,168,76,0.15);color:#c9a84c;font-size:0.75rem;font-weight:700;border-radius:20px;padding:4px 12px;" id="area-count">0</span>
      </div>
    </header>

    <main class="admin-content">
      <div class="row">
        <!-- Add Area Form -->
        <div class="col-lg-4 mb-4">
          <div class="admin-card animate-in">
            <div class="card-header-custom">
              <h5><i class="bi bi-plus-circle me-2" style="color:#c9a84c;"></i>Add Practice Area</h5>
            </div>
            <div class="card-body-custom">
              <form id="add-area-form" class="admin-form">
                <div class="mb-3">
                  <label class="form-label">Area Name</label>
                  <input type="text" id="new-area-name" class="form-control" placeholder="e.g. Criminal Law" required>
                </div>
                <button type="submit" class="btn-admin-gold w-100" style="border-radius:8px;">
                  <i class="bi bi-plus-lg"></i> Add
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Areas List -->
        <div class="col-lg-8 mb-4">
          <div class="admin-card animate-in" style="animation-delay:0.1s">
            <div class="card-header-custom">
              <h5><i class="bi bi-journals me-2" style="color:#c9a84c;"></i>All Practice Areas</h5>
            </div>
            <div class="card-body-custom p-0" id="areas-list">
              <div class="text-center py-5"><div class="loader-ring mx-auto"></div></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="edit-area-modal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Practice Area</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="edit-area-form" class="admin-form">
          <div class="mb-0">
            <label class="form-label">Area Name</label>
            <input type="text" id="edit-area-name" class="form-control" required placeholder="e.g. Family Law">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" form="edit-area-form" class="btn-admin-primary" style="border-radius:6px;font-size:0.85rem;">Update</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/admin/auth.js"></script>
<script src="../assets/js/admin/practice-areas.js"></script>
</body>
</html>
